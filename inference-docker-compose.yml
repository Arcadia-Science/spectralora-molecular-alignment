services:

  # ---------------------------------------------------------------------------
  # Postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: detanet
      POSTGRES_USER: detanet
      POSTGRES_PASSWORD: detanet
    ports:
      - "5432:5432"
    volumes:
      - ./db/init:/docker-entrypoint-initdb.d:ro

  # ---------------------------------------------------------------------------
  # Redis Cluster (3 primaries, 0 replicas)
  # Cluster is initialised by run_inference.sh after all nodes are up
  # ---------------------------------------------------------------------------
  redis-1:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-1
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes

  redis-2:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-2
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes

  redis-3:
    image: redis:7-alpine
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-hostname redis-3
      --cluster-announce-port 6379
      --cluster-announce-bus-port 16379
      --appendonly yes

  # ---------------------------------------------------------------------------
  # Model service (scale with --scale model=3)
  # nginx in front does round-robin across replicas via Docker DNS
  # ---------------------------------------------------------------------------
  model:
    build:
      context: .
      dockerfile: apps/model/Dockerfile
    restart: unless-stopped
    environment:
      WEB_CONCURRENCY: "1"

  model-nginx:
    image: nginx:alpine
    volumes:
      - ./apps/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - model

  # ---------------------------------------------------------------------------
  # API
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://detanet:detanet@postgres:5432/detanet
      REDIS_CLUSTER_NODES: redis-1:6379,redis-2:6379,redis-3:6379
      MODEL_URL: http://model-nginx
      PARQUET_DIR: /data/processed
      CACHE_TTL_SECONDS: 300
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis-3
      - model-nginx
    volumes:
      - ./data/processed:/data/processed:ro

  # ---------------------------------------------------------------------------
  # Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
